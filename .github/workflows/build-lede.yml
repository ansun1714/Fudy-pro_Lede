name: 编译 LEDE 固件 (WH3000)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '启用 SSH 调试'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede.git
  REPO_BRANCH: master

  CONFIG_FILE: lede.config

  DIY_P1_SH: diy-part1-lede.sh
  DIY_P2_SH: diy-part2-lede.sh

  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/share/swift

          sudo docker image prune -a -f || true

          df -hT

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt update

          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint \
            binutils bison build-essential bzip2 ccache clang \
            cmake cpio curl device-tree-compiler ecj fastjar \
            flex gawk gettext gcc-multilib g++-multilib git \
            gnutls-dev gperf haveged help2man intltool jq \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev \
            libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool libz-dev lrzsz msmtp ninja-build \
            p7zip p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-pyelftools qemu-utils rsync \
            scons squashfs-tools subversion swig texinfo uglifyjs \
            unzip vim wget xmlto xxd zlib1g-dev file

          sudo timedatectl set-timezone "$TZ"

      - name: 克隆 LEDE 源码
        run: |
          git clone $REPO_URL -b $REPO_BRANCH openwrt

      - name: 执行 DIY1
        run: |
          chmod +x $DIY_P1_SH

          cd openwrt

          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装 feeds
        run: |
          cd openwrt

          ./scripts/feeds update -a

          # 删除可能冲突的软件包
          rm -rf feeds/packages/net/vsftpd
          rm -rf feeds/luci/applications/luci-app-vsftpd

          ./scripts/feeds install -f -a

      - name: 复制配置文件
        run: |
          cp $CONFIG_FILE openwrt/.config

      - name: 执行 DIY2
        run: |
          chmod +x $DIY_P2_SH

          cd openwrt

          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH 调试
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 加载配置
        run: |
          cd openwrt

          make defconfig

          echo "========== 当前配置 =========="
          ./scripts/diffconfig.sh

      - name: 下载依赖
        run: |
          cd openwrt

          make download -j$(nproc)

          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        id: compile
        run: |
          cd openwrt

          echo "========== 开始编译 =========="

          if ! make -j$(nproc); then
            echo "========== 多线程失败，切换单线程 =========="
            make -j1 V=s
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: 整理固件
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*

          rm -rf packages

          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: 上传 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: LEDE-WH3000
          path: ${{ env.FIRMWARE }}

      - name: 生成 Release 标签
        id: tag
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "release_tag=lede-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
