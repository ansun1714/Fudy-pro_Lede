name: 编译 LEDE(Fudy/fudy_pro)

on:
  workflow_dispatch:
    inputs:
      device:
        description: "选择设备型号"
        required: true
        default: "WH3000"
        type: choice
        options:
          - WH3000
          - WH3000Pro

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
    # =========================
    # 检出仓库
    # =========================
    - name: 检出仓库
      uses: actions/checkout@v4

    # =========================
    # 释放磁盘空间（稳定版）
    # =========================
    - name: 释放磁盘空间
      run: |
        echo "删除无用环境..."

        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL

        sudo docker image prune -a -f

        sudo apt-get clean

        sudo swapoff -a || true
        sudo rm -f /swapfile

        echo "当前磁盘空间:"
        df -h

    # =========================
    # 初始化环境
    # =========================
    - name: 初始化编译环境
      run: |
        sudo apt-get update

        sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        python3-pyelftools \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        ccache

    # =========================
    # 克隆 LEDE
    # =========================
    - name: 克隆 LEDE 源码
      run: |
        git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt

    # =========================
    # DIY1
    # =========================
    - name: 执行 DIY1
      run: |
        chmod +x diy-part1.sh

        cd openwrt
        ../diy-part1.sh

    # =========================
    # feeds
    # =========================
    - name: 更新 feeds
      run: |
        cd openwrt

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # =========================
    # 根据设备加载配置
    # =========================
    - name: 加载设备配置
      run: |
        DEVICE="${{ github.event.inputs.device }}"

        echo "当前设备: $DEVICE"

        if [ "$DEVICE" = "WH3000Pro" ]; then
          cp wh3000pro.config openwrt/.config
        else
          cp wh3000.config openwrt/.config
        fi

    # =========================
    # DIY2
    # =========================
    - name: 执行 DIY2
      run: |
        chmod +x diy-part2.sh

        cd openwrt
        ../diy-part2.sh

    # =========================
    # defconfig
    # =========================
    - name: 加载配置
      run: |
        cd openwrt

        make defconfig

    # =========================
    # 查看目标设备
    # =========================
    - name: 查看目标设备
      run: |
        cd openwrt

        echo "===================="
        echo "Target Profile:"
        grep CONFIG_TARGET.*DEVICE.*=y .config || true
        echo "===================="

    # =========================
    # 下载 dl
    # =========================
    - name: 下载 dl
      run: |
        cd openwrt

        make download -j8

    # =========================
    # 编译
    # =========================
    - name: 编译固件
      run: |
        cd openwrt

        echo "开始编译..."

        make -j2 V=s

    # =========================
    # 整理固件
    # =========================
    - name: 整理固件
      run: |
        mkdir -p upload

        DEVICE="${{ github.event.inputs.device }}"

        find openwrt/bin/targets/ -type f \
          \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" \) \
          -exec cp {} upload/ \;

        cd upload

        for file in *; do
          mv "$file" "${DEVICE}_${file}"
        done

        echo "固件列表:"
        ls -lh

    # =========================
    # 上传 Artifact
    # =========================
    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.device }}_firmware
        path: upload

    # =========================
    # 生成 Release 标签
    # =========================
    - name: 生成 Release 标签
      id: tag
      run: |
        echo "release_tag=${{ github.event.inputs.device }}-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

    # =========================
    # 发布 Release
    # =========================
    - name: 发布到 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: upload/*
        generate_release_notes: false
        token: ${{ secrets.GITHUB_TOKEN }}
