name: 编译 LEDE 固件 (WH3000)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: config/WH3000.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4

    - name: 释放磁盘空间
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update
        sudo apt full-upgrade -y

        sudo apt install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        python3-pyelftools \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        qemu-utils \
        ccache \
        libelf-dev \
        ecj \
        fastjar \
        java-propose-classpath \
        python3-distutils \
        time

        sudo timedatectl set-timezone "$TZ"

    - name: 克隆 LEDE 源码
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH lede

    - name: 执行 DIY1
      run: |
        chmod +x $DIY_P1_SH
        cd lede
        ../$DIY_P1_SH

    - name: 更新并安装 feeds
      run: |
        cd lede
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 复制配置文件
      run: |
        cp $CONFIG_FILE lede/.config

    - name: 执行 DIY2
      run: |
        chmod +x $DIY_P2_SH
        cd lede
        ../$DIY_P2_SH

    - name: 加载配置
      run: |
        cd lede
        make defconfig

    - name: 下载依赖
      run: |
        cd lede
        make download -j8

    - name: 编译固件
      run: |
        cd lede
        make -j$(nproc) V=s

    - name: 整理固件
      run: |
        mkdir -p upload
        find lede/bin/targets/ -type f \
        \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.tar" \) \
        -exec cp {} upload/ \;

    - name: 上传 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: LEDE-WH3000
        path: upload/

    - name: 生成 Release 标签
      id: tag
      run: |
        echo "release_tag=lede-$(date +%Y.%m.%d-%H%M)" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布 Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: upload/*
        draft: false
        prerelease: false

    - name: 完成编译
      run: echo "编译完成"
