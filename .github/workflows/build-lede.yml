name: 编译 LEDE 固件（WH3000）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检出仓库
      uses: actions/checkout@v4

    # =========================
    # 释放磁盘空间（稳定版）
    # =========================
    - name: 释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f

        sudo apt-get clean
        sudo swapoff -a
        sudo rm -f /swapfile

        df -h

    # =========================
    # 安装依赖（稳定版）
    # =========================
    - name: 初始化编译环境
      run: |
        sudo apt-get update

        sudo apt-get install -y \
        build-essential \
        clang \
        flex \
        bison \
        g++ \
        gawk \
        gcc-multilib \
        g++-multilib \
        gettext \
        git \
        libncurses5-dev \
        libssl-dev \
        python3 \
        python3-pyelftools \
        rsync \
        unzip \
        zlib1g-dev \
        file \
        wget \
        curl \
        ccache

    # =========================
    # 拉取源码
    # =========================
    - name: 克隆 LEDE 源码
      run: |
        git clone --depth=1 https://github.com/coolsnowwolf/lede openwrt

    # =========================
    # DIY1
    # =========================
    - name: 执行 DIY1
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        ../diy-part1.sh

    # =========================
    # 更新 feeds
    # =========================
    - name: 更新 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # =========================
    # 复制配置
    # =========================
    - name: 复制配置
      run: |
        cp lede.config openwrt/.config

    # =========================
    # DIY2
    # =========================
    - name: 执行 DIY2
      run: |
        chmod +x diy-part2.sh
        cd openwrt
        ../diy-part2.sh

    # =========================
    # defconfig
    # =========================
    - name: 加载配置
      run: |
        cd openwrt
        make defconfig

    # =========================
    # 下载 dl
    # =========================
    - name: 下载 dl
      run: |
        cd openwrt
        make download -j8

    # =========================
    # 编译
    # =========================
    - name: 编译固件
      run: |
        cd openwrt
        make -j2 V=s

    # =========================
    # 整理固件
    # =========================
    - name: 整理固件
      run: |
        mkdir -p upload
        find openwrt/bin/targets/ -type f \
          \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" \) \
          -exec cp {} upload/ \;

    # =========================
    # 上传
    # =========================
    - name: 上传固件
      uses: actions/upload-artifact@v4
      with:
        name: WH3000_firmware
        path: upload
